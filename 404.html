<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Lost at sea — The Dulaney Wedding</title>
<meta name="robots" content="noindex, nofollow" />
<meta name="theme-color" content="#f4efe4" />
<meta name="color-scheme" content="light" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%23262114'/><text x='16' y='23' font-family='Georgia,serif' font-size='17' fill='%23f4efe4' text-anchor='middle'>D</text></svg>" />
<link rel="apple-touch-icon" href="https://meni-gottesman.github.io/dulaney/assets/apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root { --ivory:#f4efe4; --ink:#262114; --accent:#4f7d83; }
  * { margin:0; box-sizing:border-box; }
  html,body { height:100%; }
  body {
    background:var(--ivory); color:var(--ink);
    font-family:"Jost",system-ui,sans-serif;
    display:flex; align-items:center; justify-content:center;
    text-align:center; padding:2rem; min-height:100vh;
  }
  .wrap { max-width:34rem; }
  .eyebrow {
    font-size:0.72rem; letter-spacing:0.32em; text-transform:uppercase;
    color:color-mix(in oklch, var(--ink) 52%, transparent); margin-bottom:1.4rem;
  }
  h1 {
    font-family:"Cormorant Garamond",Georgia,serif; font-weight:400;
    font-size:clamp(2.6rem,9vw,4.4rem); line-height:1.04; letter-spacing:0.01em;
    margin-bottom:1.2rem;
  }
  h1 em { font-style:italic; }
  p { font-size:1rem; line-height:1.7; color:color-mix(in oklch, var(--ink) 78%, transparent); margin-bottom:2.4rem; }
  a.home {
    display:inline-block; font-size:0.72rem; letter-spacing:0.26em; text-transform:uppercase;
    color:var(--ink); text-decoration:none;
    border-bottom:1px solid color-mix(in oklch, var(--ink) 40%, transparent);
    padding-bottom:0.4rem; transition:border-color .3s ease;
  }
  a.home:hover { border-color:var(--ink); }
  .meta { margin-top:3.2rem; font-size:0.66rem; letter-spacing:0.24em; text-transform:uppercase;
    color:color-mix(in oklch, var(--ink) 44%, transparent); }
</style>
</head>
<body>
  <main class="wrap">
    <p class="eyebrow">Error 404</p>
    <h1>This page drifted <em>out to sea</em></h1>
    <p>The link you followed doesn’t exist — but the celebration is still right this way.</p>
    <a class="home" href="https://meni-gottesman.github.io/dulaney/">Return home →</a>
    <p class="meta">Four Seasons, Nevis · May 6–10, 2027</p>
  </main>
</body>
</html>
