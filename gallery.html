<!-- ====================== GALLERY ====================== -->
<section class="section" id="gallery" style="padding-top:0">
  <div class="wrap">
    <!-- Six frames, only of the two of them, sequenced as a small arc:
         the place → tenderness → joy → golden romance → a still portrait → present, to camera.
         Colour and black-and-white alternate (g1 B&W, g2 colour, …). Swap files in assets/ (g1–g6).
         g1 0420 · g2 0086 · g3 0942 · g4 0320 · g5 1932 · g6 0778 -->
    <div class="gallery-grid" role="group" aria-label="Engagement photos — tap any to enlarge">
      <figure class="tile reveal" tabindex="0" role="button" aria-label="Enlarge photo"><img class="duo" src="assets/g1.jpg" width="1000" height="1500" alt="The two of them on the bow, the island behind" loading="lazy" decoding="async" /></figure>
      <figure class="tile reveal" tabindex="0" role="button" aria-label="Enlarge photo"><img class="duo" src="assets/g2.jpg" width="1000" height="1500" alt="Foreheads together, a quiet moment" loading="lazy" decoding="async" /></figure>
      <figure class="tile reveal" tabindex="0" role="button" aria-label="Enlarge photo"><img class="duo" src="assets/g3.jpg" width="1000" height="1500" alt="Laughing, in black and white" loading="lazy" decoding="async" /></figure>
      <figure class="tile reveal" tabindex="0" role="button" aria-label="Enlarge photo"><img class="duo" src="assets/g4.jpg" width="1000" height="1500" alt="An embrace in golden light" loading="lazy" decoding="async" /></figure>
      <figure class="tile reveal" tabindex="0" role="button" aria-label="Enlarge photo"><img class="duo" src="assets/g5.jpg" width="1000" height="1500" alt="The two of them, to camera" loading="lazy" decoding="async" /></figure>
      <figure class="tile reveal" tabindex="0" role="button" aria-label="Enlarge photo"><img class="duo" src="assets/g6.jpg" width="1000" height="1500" alt="Together at the rail, looking back at us" loading="lazy" decoding="async" /></figure>
